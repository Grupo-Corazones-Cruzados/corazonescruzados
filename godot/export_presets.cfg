[preset.0]

name="Web"
platform="Web"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../public/game/index.html"
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
; Sin hilos a propósito. Con hilos, el navegador exige aislamiento de origen
; (COOP/COEP), y esa cabecera rompe TODO recurso externo de la ruta: fuentes,
; Cloudinary, analítica. En una app que ya usa varios servicios, es un campo
; minado. Además no ahorra tamaño: medido, con y sin hilos pesan casi igual.
variant/thread_support=false
variant/extensions_support=false
vram_texture_compression/for_desktop=false
vram_texture_compression/for_mobile=false
html/export_icon=false
html/custom_html_shell=""
html/head_include=""
; 2 = el canvas se adapta al contenedor sin secuestrar el tamaño de la ventana.
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
; NUNCA activar. El modo PWA registra un service worker cuyo ámbito secuestra
; las rutas de Next.js: el juego se comería la navegación de toda la app.
progressive_web_app/enabled=false
progressive_web_app/ensure_cross_origin_isolation_headers=false
